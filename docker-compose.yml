version: '3.8'

services:
  # MySQL 설정
  mysql-db:
    image: mysql:8.0
    container_name: mysql_svc
    restart: always
    user: "root" 
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "whtjdcks"
      MYSQL_ROOT_HOST: "%"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --bind-address=0.0.0.0

  # Redis 설정
  redis-db:
    image: redis:latest
    container_name: redis_svc
    restart: always
    user: "root"
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data